name: isi_steel_sales_mobile
description: Centralized enterprise mobile solution for KIC GROUP and subsidiaries.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.6
  intl: ^0.20.2
  flutter_bloc: ^8.1.3
  bloc: 8.1.4
  equatable: 2.0.5
  get_it: ^7.6.0
  flutter_secure_storage: ^9.0.0
  dio: ^5.4.0
  connectivity_plus: ^6.0.0
  bloc_concurrency: ^0.2.5
  hive_flutter: ^1.1.0
  fl_chart: 0.66.0
  cached_network_image: ^3.3.1
  badges: 3.1.2
  lottie: ^3.1.2
  flutter_screenutil: ^5.9.3
  geolocator: ^11.0.0
  geocoding: ^4.0.0
  sqflite: ^2.3.0
  path: ^1.9.0
  mobile_scanner: ^5.2.3
  json_annotation: ^4.9.0
  google_maps_flutter: ^2.9.0
  file_picker: ^10.3.10
  image_picker: ^1.1.2
  speech_to_text: ^7.0.0
  image: ^4.5.0
  phone_form_field: ^10.0.18

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4
  build_runner: ^2.15.0
  json_serializable: ^6.14.0
  # 1. Added the launcher icons tool here
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:

    # 2. Include your logos folder here
    - assets/logos/
    - assets/mock/
    - assets/images/
    - assets/lang/

  fonts:
    - family: Kantumruy
      fonts:
        - asset: assets/fonts/kantumruy_5.2.5/ttf/kantumruy-khmer-300-normal.ttf
          weight: 300
        - asset: assets/fonts/kantumruy_5.2.5/ttf/kantumruy-khmer-400-normal.ttf
          weight: 400
        - asset: assets/fonts/kantumruy_5.2.5/ttf/kantumruy-khmer-700-normal.ttf
          weight: 700
    # Latin UI font used for the English locale (Khmer uses Kantumruy above).
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/static/Inter_18pt-Light.ttf
          weight: 300
        - asset: assets/fonts/Inter/static/Inter_18pt-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter/static/Inter_18pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter/static/Inter_18pt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter/static/Inter_18pt-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter/static/Inter_18pt-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Inter/static/Inter_18pt-Black.ttf
          weight: 900

# 3. Added configuration for Android and iOS asset generation
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logos/isi_app_logo.png"
  min_sdk_android: 21